run_switch: true
schedule:
  times_jst:
  - 07:00
  # - '19:00'  # 夕方の投稿を停止（朝1本のみに変更）
claude:
  models:
    # Primary model (優先モデル)
    - claude-sonnet-4-5-20250929
    # Fallback models (フォールバック用、上から順に試行)
    - claude-sonnet-4-20250514
    - claude-3-opus-20240229
  max_tokens: 8000
  temperature: 0.2
fetch:
  max_candidates_per_run: 50
  language_preference:
  - ja
  - en
  feeds:
  # 公式ブログ（高優先度）
  - url: https://openai.com/blog.rss
    weight: 1.2
  - url: https://ai.googleblog.com/feeds/posts/default
    weight: 1.2
  - url: https://www.anthropic.com/feed.xml
    weight: 1.2
  # 主要テックメディア
  - url: https://www.theverge.com/ai-artificial-intelligence/rss/index.xml
    weight: 1.0
  - url: https://arstechnica.com/ai/feed/
    weight: 1.0
  - url: https://www.technologyreview.com/topic/artificial-intelligence/feed/
    weight: 1.0
  - url: https://venturebeat.com/category/ai/feed/
    weight: 0.9
  # 追加メディア
  - url: https://techcrunch.com/category/artificial-intelligence/feed/
    weight: 1.0
  - url: https://www.wired.com/feed/tag/ai/latest/rss
    weight: 0.9
  - url: https://www.zdnet.com/topic/artificial-intelligence/rss.xml
    weight: 0.8
  - url: https://www.engadget.com/tag/ai/rss.xml
    weight: 0.8
  # 日本語メディア
  - url: https://www.itmedia.co.jp/aiplus/rss/aiplus.xml
    weight: 1.1
  - url: https://ledge.ai/feed/
    weight: 1.0
  - url: https://ainow.ai/feed/
    weight: 1.0
selection:
  min_score: 0.6
  dedup_window_hours: 72
  blacklist_domains: []
  whitelist_domains: []
  max_scan_per_feed: 10
  candidate_limit: 50
  ja_priority: 1.0
  en_priority: 0.8
  # セール・商業記事の除外キーワード
  excluded_keywords:
  - Black Friday
  - Cyber Monday
  - セール
  - 割引
  - クーポン
  - deal
  - deals
  - discount
  - sale
  - offer
  - promo
  - promotion
  - coupon
  - price drop
  - 特価
  - 安売り
  - バーゲン
  keyword_boosts:
  - AI
  - 生成AI
  - LLM
  - GPT
  - Claude
  - OpenAI
  - Google
  - Anthropic
  - Gemini
  - Sora
  - 安全性
  - 規制
  - 著作権
  - 推論
  - 推測
  - 推論最適化
  - RAG
  - エージェント
  - 推論コスト
  - ベンチマーク
  - MMLU
  - MMMU
  - 長文
  - 動画生成
  - 音声生成
  - AIチップ
  - NVIDIA
  - H100
  - B200
  - DevDay
  - Developer
  - API
  source_weights:
    openai.com: 1.2
    ai.googleblog.com: 1.1
    googleblog.com: 1.1
    anthropic.com: 1.2
    theverge.com: 1.0
    arstechnica.com: 1.0
    technologyreview.com: 1.0
    venturebeat.com: 0.9
  domain_cooldown_days: 1
  dup_window_days: 7
  weights:
    freshness: 0.3
    source: 0.15
    language: 0.1
    keyword: 0.25
    llm_virality: 0.3
translate:
  enabled: true
  target_lang: ja
generate:
  title_max_len: 62
  lead_max_chars: 180
  summary_bullets: 5
  body_target_chars: 2000  # より詳しい説明のため増加
  meta_description_chars: 120
  # 記事タイプ優先順位設定
  content_strategy:
    article_type_priority:
      howto_creation: 0.5      # Type A: 実践的なハウツー記事作成のボーナス
      howto_introduction: 0.3   # Type B: ハウツー記事紹介のボーナス
      news_summary: 0.0         # Type C: ニュースまとめ（現行）のボーナス
  # 実用性重視設定
  practical_focus:
    include_implementation_steps: true
    include_required_skills: true
    include_cost_estimation: true
    include_risk_analysis: true
  # 信頼性向上設定
  reliability:
    show_information_freshness: true
    distinguish_confirmed_vs_speculation: true
    include_source_credibility: true
wordpress:
  tag_ids: []
  status: publish
  featured_image:
    use_og_image: true
    fallback_path: ''
    random_media_ids:
      - 7160  # ChatGPT Image 2025年10月9日 21_11_45 (最新)
      - 7152  # ChatGPT Image 2025年10月9日 20_49_12
      - 7151  # ChatGPT Image 2025年10月9日 20_49_17
      - 7144  # ChatGPT Image 2025年10月9日 20_45_49
  category_ids:
  - 1
  - 24
  - 26
logging:
  level: INFO
